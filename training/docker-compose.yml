# Reproducible training on Chameleon (Linux): build and run inside Docker with MLflow on the host.
# Prerequisites: mlflow server listening (e.g. 127.0.0.1:5000), same VM as Docker with network_mode: host.
#
# From repository root:
#   export GIT_SHA=$(git rev-parse HEAD)
#   export MLFLOW_TRACKING_URI=http://127.0.0.1:5000
#   docker compose -f training/docker-compose.yml build tone-train llm-train
#   docker compose -f training/docker-compose.yml run --rm tone-train --config /app/configs/candidate_tone_distilbert.yaml
#   docker compose -f training/docker-compose.yml run --rm llm-train --config /app/configs/llm_generator_small.yaml
#
# network_mode: host is invalid on Docker Desktop for Windows/Mac; use only on Linux (Chameleon).

services:
  tone-train:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: tone-train:proj15
    network_mode: host
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://127.0.0.1:5000}

  llm-train:
    build:
      context: .
      dockerfile: Dockerfile.llm
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: llm-train:proj15
    network_mode: host
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://127.0.0.1:5000}
